name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: poi_curator
          POSTGRES_PASSWORD: poi_curator
          POSTGRES_DB: poi_curator
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U poi_curator -d poi_curator"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POI_CURATOR_DATABASE_URL: postgresql+psycopg://poi_curator:poi_curator@localhost:5432/poi_curator

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Typecheck
        run: mypy apps packages tests
      - name: Run migrations
        run: alembic upgrade head
      - name: Test
        run: pytest
